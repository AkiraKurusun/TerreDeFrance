<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Illustration of France</title>
  <desc id="desc">A stylized illustration of the Eiffel Tower against a tricolor sky, with the Alps and a coastline representing France's varied geography.</desc>

  <!-- Tricolor sky -->
  <rect x="0" y="0" width="266.7" height="500" fill="#0055a4"/>
  <rect x="266.7" y="0" width="266.6" height="500" fill="#ffffff"/>
  <rect x="533.3" y="0" width="266.7" height="500" fill="#ef4135"/>

  <!-- Sun -->
  <circle cx="640" cy="110" r="46" fill="#ffe08a" opacity="0.9"/>

  <!-- Distant Alps -->
  <polygon points="0,330 90,220 170,300 250,200 340,330" fill="#8fa8bf" opacity="0.85"/>
  <polygon points="120,330 230,180 300,280 400,150 480,330" fill="#7594ad" opacity="0.85"/>

  <!-- Rolling ground -->
  <path d="M0,360 C120,320 220,400 400,360 C560,325 680,400 800,355 L800,500 L0,500 Z" fill="#4d7a4f"/>
  <path d="M0,400 C150,380 300,430 500,405 C620,390 720,420 800,400 L800,500 L0,500 Z" fill="#3c6640"/>

  <!-- Coastline / river ribbon -->
  <path d="M0,430 C180,410 260,460 420,440 C560,425 640,460 800,435 L800,460 C640,485 560,450 420,465 C260,485 180,435 0,455 Z" fill="#a9cbe0" opacity="0.8"/>

  <!-- Eiffel Tower silhouette -->
  <g fill="#2b2b2b">
    <polygon points="400,120 372,300 340,430 360,430 400,300 440,430 460,430 428,300"/>
    <polygon points="400,120 385,210 415,210"/>
    <rect x="352" y="345" width="96" height="10"/>
    <rect x="365" y="260" width="70" height="8"/>
    <line x1="400" x2="400" y1="120" y2="60" stroke="#2b2b2b" stroke-width="3"/>
  </g>

  <!-- Frame -->
  <rect x="1" y="1" width="798" height="498" fill="none" stroke="#1c1c1c" stroke-opacity="0.15" stroke-width="2"/>
</svg>
